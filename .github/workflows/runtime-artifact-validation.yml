name: Runtime Artifact Validation

on:
  push:
    branches:
      - issue-94
      - develop
  pull_request:
    branches:
      - issue-94
      - develop
  workflow_dispatch:

jobs:
  validate-runtime-artifact:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - Debug
          - Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Validate runtime artifact isolation (${{ matrix.configuration }})
        shell: pwsh
        run: |
          ./tools/RuntimeArtifactValidation/Check-RuntimeArtifactIsolation.ps1 `
            -Configuration ${{ matrix.configuration }} `
            -Platform x64 `
            -PlatformToolset v143
